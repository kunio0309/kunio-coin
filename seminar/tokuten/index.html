<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>KUNIO-COIN 特典交換</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="特典交換">
<meta name="theme-color" content="#0a0f0a">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --green:#2e7d32; --gl:#4caf50; --gb:#69f0ae;
  --dark:#0a0f0a; --d3:#1a2a1a; --d4:#243024;
  --text:#e8f5e9; --dim:rgba(232,245,233,0.55);
  --gold:#ffd54f; --red:#ef5350;
  --card:rgba(26,42,26,0.85); --border:rgba(105,240,174,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--dark);color:var(--text);
  min-height:100vh;overflow-x:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 20%,rgba(46,125,50,.15) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 80%,rgba(105,240,174,.08) 0%,transparent 60%);
}
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}

/* ログイン */
#screen-login{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:30px;text-align:center;
}
#screen-login.active{display:flex;}
.logo-img{
  width:90px;height:90px;border-radius:50%;overflow:hidden;
  margin-bottom:16px;box-shadow:0 0 40px rgba(105,240,174,.4);flex-shrink:0;
}
.logo-img img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;color:var(--gb);margin-bottom:4px;}
.app-subtitle{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:32px;letter-spacing:1px;}

/* NG画面（参加者以外） */
#screen-ng{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:30px;text-align:center;
}
#screen-ng.active{display:flex;}

/* ヘッダー */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,15,10,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 20px;height:60px;
  display:flex;align-items:center;justify-content:space-between;
  padding-top:env(safe-area-inset-top);
}
.header-left{display:flex;align-items:center;gap:10px;}
.header-coin{width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;}
.header-coin img{width:100%;height:100%;object-fit:cover;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--gb);}
.header-badge{font-size:11px;color:var(--dim);background:var(--d3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;}

/* コンテンツ */
.content{padding:20px;max-width:600px;margin:0 auto;padding-bottom:40px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;}
.section-title{font-size:11px;letter-spacing:3px;color:var(--dim);margin:20px 0 10px;font-family:'Bebas Neue',sans-serif;}

/* コイン残高 */
.coin-label{font-size:11px;letter-spacing:3px;color:var(--dim);margin-bottom:8px;}
.coin-value{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--gb);line-height:1;}
.coin-unit{font-size:16px;color:var(--dim);margin-left:4px;}

/* 特典カード */
.benefit-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:18px;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.benefit-card.used{opacity:.5;}
.benefit-left{display:flex;align-items:center;gap:14px;}
.benefit-icon{font-size:32px;flex-shrink:0;}
.benefit-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.benefit-cost{font-size:13px;color:var(--gold);}
.benefit-desc{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.5;}
.btn-use{
  background:linear-gradient(135deg,var(--green),var(--gl));
  border:none;border-radius:12px;padding:12px 18px;
  color:#000;font-size:13px;font-weight:900;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  transition:all .2s;
}
.btn-use:active{opacity:.8;transform:scale(.97);}
.btn-use:disabled{background:var(--d3);color:var(--dim);cursor:not-allowed;transform:none;opacity:1;}
.used-badge{
  background:rgba(105,240,174,.1);border:1px solid rgba(105,240,174,.2);
  border-radius:10px;padding:10px 14px;
  font-size:12px;color:var(--dim);white-space:nowrap;flex-shrink:0;
}

/* ボタン */
.form-input{width:100%;max-width:320px;background:var(--d3);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;color:var(--text);font-size:15px;
  margin-bottom:12px;outline:none;display:block;}
.form-input:focus{border-color:rgba(105,240,174,.4);}
.btn-primary{width:100%;max-width:320px;padding:16px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--green),var(--gl));
  color:#000;font-size:15px;font-weight:900;cursor:pointer;
  margin-bottom:12px;letter-spacing:1px;transition:all .2s;display:block;}
.btn-primary:active{opacity:.8;transform:scale(.98);}
.btn-text{background:none;border:none;color:var(--gb);font-size:12px;cursor:pointer;
  padding:4px 0;text-decoration:underline;margin-top:4px;}
.btn-secondary{
  width:100%;padding:14px;border-radius:14px;
  border:1px solid var(--border);background:transparent;
  color:var(--dim);font-size:14px;cursor:pointer;margin-top:8px;
}

/* トースト */
.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:rgba(105,240,174,.15);border:1px solid rgba(105,240,174,.3);
  border-radius:12px;padding:12px 24px;
  font-size:13px;color:var(--gb);z-index:9999;
  transition:transform .3s;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>

      <div class="header-title">特典交換</div>
    </div>
    <div class="header-badge" id="user-name-badge">—</div>
  </div>
  <div class="content">

    <!-- コイン残高 -->
    <div class="card">
      <div class="coin-label">● 使えるKUNIO-COIN</div>
      <div>
        <span class="coin-value" id="coin-balance">0</span>
        <span class="coin-unit">枚</span>
      </div>
    </div>

    <div class="section-title">● 特典一覧</div>

    <!-- 特典リスト -->
    <div id="benefit-list"></div>

    <button class="btn-secondary" onclick="doSignOut()">ログアウト</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signOut, onAuthStateChanged,
         signInWithEmailAndPassword, sendPasswordResetEmail }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, updateDoc, addDoc,
         collection, serverTimestamp, increment }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCcWAmMcQgb5PmeuUr7OHlcd7Jlpw3oDhw",
  authDomain: "kunio-coin.firebaseapp.com",
  projectId: "kunio-coin",
  storageBucket: "kunio-coin.firebasestorage.app",
  messagingSenderId: "812835438784",
  appId: "1:812835438784:web:d4cb6b4869da901dda2d25"
};

// ── 特典一覧（内容・枚数は後から変更可能） ──
const BENEFITS = [
  { id:'afp',    icon:'🌟', name:'入会特典',        cost:1000, desc:'コミュニティ入会時に適用されます' },
  { id:'party',  icon:'🎉', name:'二次会参加権',    cost:300,  desc:'セミナー後の二次会にご参加いただけます' },
  { id:'consul', icon:'👤', name:'個別面談（30分）', cost:500,  desc:'KUNIOと1対1でお話できます' },
];

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUser  = null;
let currentCoins = 0;
let userData     = {};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

window.doLogin = async function(){
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if(!email || !password){ showToast('メールアドレスとパスワードを入力してください'); return; }
  try{
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e){
    if(e.code==='auth/user-not-found'||e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'){
      showToast('メールアドレスまたはパスワードが違います');
    } else if(e.code==='auth/invalid-email'){
      showToast('メールアドレスの形式が正しくありません');
    } else if(e.code==='auth/too-many-requests'){
      showToast('試行回数が多すぎます。しばらく待ってからお試しください');
    } else {
      showToast('ログインエラー: '+(e.code||e.message));
    }
  }
};
window.doResetPassword = async function(){
  const email = document.getElementById('login-email').value.trim();
  if(!email){ showToast('上のメールアドレス欄に入力してから押してください'); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    showToast('パスワードリセットメールを送りました📧');
  } catch(e){
    showToast('送信エラー: '+(e.code||e.message));
  }
};
window.doSignOut = async function() {
  await signOut(auth);
  showScreen('screen-login');
};

onAuthStateChanged(auth, async (user) => {
  if (!user) { showScreen('screen-login'); return; }
  currentUser = user;

  // seminar_users に存在するか確認
  const userRef  = doc(db, 'seminar_users', user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    // セミナー参加者でない → NG画面
    showScreen('screen-ng');
    return;
  }

  userData     = userSnap.data();
  currentCoins = userData.coins || 0;

  document.getElementById('coin-balance').textContent = currentCoins.toLocaleString();
  document.getElementById('user-name-badge').textContent = (user.displayName||user.email||'').substring(0,8);

  renderBenefits();
  showScreen('screen-tokuten');
});

function renderBenefits() {
  const el = document.getElementById('benefit-list');
  el.innerHTML = BENEFITS.map(b => {
    const used   = userData[`used_${b.id}`] || false;
    const enough = currentCoins >= b.cost;
    return `
    <div class="benefit-card ${used?'used':''}">
      <div class="benefit-left">
        <span class="benefit-icon">${b.icon}</span>
        <div>
          <div class="benefit-name">${b.name}</div>
          <div class="benefit-cost">${b.cost.toLocaleString()}枚</div>
          <div class="benefit-desc">${b.desc}</div>
        </div>
      </div>
      ${used
        ? '<div class="used-badge">✅ 申請済み</div>'
        : `<button class="btn-use" ${enough?'':'disabled'} onclick="useBenefit('${b.id}',${b.cost},'${b.name}')">
            ${enough?'使う':'コイン不足'}
           </button>`
      }
    </div>`;
  }).join('');
}

window.useBenefit = async function(benefitId, cost, name) {
  if (!confirm(`「${name}」を申請しますか？\n${cost.toLocaleString()}枚 が消費されます。`)) return;

  if (currentCoins < cost) { showToast('コインが足りません'); return; }

  const userRef = doc(db, 'seminar_users', currentUser.uid);
  await updateDoc(userRef, {
    coins: increment(-cost),
    [`used_${benefitId}`]: true
  });
  await addDoc(collection(db, 'seminar_requests'), {
    uid:         currentUser.uid,
    name:        currentUser.displayName || currentUser.email,
    email:       currentUser.email,
    benefitId,
    benefitName: name,
    cost,
    status:      'pending',
    createdAt:   serverTimestamp()
  });

  currentCoins -= cost;
  userData[`used_${benefitId}`] = true;
  document.getElementById('coin-balance').textContent = currentCoins.toLocaleString();
  renderBenefits();
  showToast(`✅ 「${name}」を申請しました！`);
};
</script>
</body>
</html>
