<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>KUNIO-COIN メンバー登録</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:#2e7d32;--gl:#4caf50;--gb:#69f0ae;
  --dark:#0a0f0a;--d2:#111a11;--d3:#1a2a1a;--d4:#243024;
  --text:#e8f5e9;--dim:rgba(232,245,233,0.55);
  --gold:#ffd54f;--red:#ef5350;
  --card:rgba(26,42,26,0.85);--border:rgba(105,240,174,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100vh;background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 30% 20%,rgba(46,125,50,.18) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(105,240,174,.08) 0%,transparent 50%);}

.container{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}

.logo{width:80px;height:80px;border-radius:50%;overflow:hidden;margin-bottom:16px;box-shadow:0 0 40px rgba(105,240,174,.3);}
.logo img{width:100%;height:100%;object-fit:cover;display:block;}

h1{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;color:var(--gb);margin-bottom:4px;}
.subtitle{font-size:12px;letter-spacing:2px;color:var(--dim);margin-bottom:32px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:400px;backdrop-filter:blur(10px);}

.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;letter-spacing:1px;color:var(--dim);margin-bottom:6px;}
input,select{width:100%;background:var(--d3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;}
input:focus,select:focus{border-color:rgba(105,240,174,.4);}
select option{background:var(--d3);color:var(--text);}

.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),var(--gl));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px;transition:opacity .2s;}
.btn:hover{opacity:.9;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.note{font-size:11px;color:var(--dim);line-height:1.8;margin-top:16px;padding:12px;background:rgba(0,0,0,.2);border-radius:10px;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--d4);border:1px solid var(--border);border-radius:20px;padding:12px 24px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;}

.success-screen{display:none;text-align:center;}
.success-icon{font-size:60px;margin-bottom:16px;}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--gb);margin-bottom:8px;}
.success-text{font-size:13px;color:var(--dim);line-height:1.8;}
</style>
</head>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCcWAmMcQgb5PmeuUr7OHlcd7Jlpw3oDhw",
  authDomain: "kunio-coin.firebaseapp.com",
  projectId: "kunio-coin",
  storageBucket: "kunio-coin.firebasestorage.app",
  messagingSenderId: "812835438784",
  appId: "1:812835438784:web:d4cb6b4869da901dda2d25"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.doRegister = async function() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('password').value;
  const pw2 = document.getElementById('password2').value;
  const memberType = document.getElementById('member-type').value;

  if (!name) { showToast('⚠️ お名前を入力してください'); return; }
  if (!email) { showToast('⚠️ メールアドレスを入力してください'); return; }
  if (pw.length < 6) { showToast('⚠️ パスワードは6文字以上です'); return; }
  if (pw !== pw2) { showToast('⚠️ パスワードが一致しません'); return; }

  const btn = document.getElementById('register-btn');
  btn.textContent = '送信中...'; btn.disabled = true;

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    const uid = cred.user.uid;

    await setDoc(doc(db, 'users', uid), {
      name: name,
      email: email,
      memberType: memberType,
      points: 0,
      isAdmin: false,
      isApproved: true,
      createdAt: serverTimestamp()
    });

    document.getElementById('register-form').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';

  } catch(e) {
    console.error(e);
    if (e.code === 'auth/email-already-in-use') {
      showToast('⚠️ このメールアドレスはすでに登録されています');
    } else {
      showToast('⚠️ エラー: ' + e.message);
    }
    btn.textContent = '登録申請を送る'; btn.disabled = false;
  }
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}


</script>
</body>
</html>
